# Default (English) fallback messages.
# Keep keys hierarchical: <domain>.<context>.<reason>.

system.ping=ok

# Authentication / authorization
error.auth.required=Authentication is required.
error.permission.denied=You do not have permission to perform this action.

# Request / validation
error.request.invalid=The request could not be processed.
error.request.conflict=The request could not be completed due to a conflict.
error.request.bodyInvalid=Please check the request data and try again.
error.validation.fields=Please check the required fields and try again.

# Server
error.server.unexpected=An unexpected error occurred. Please try again later.

# Reference lookups
error.ref.tenantNotFound=Tenant not found.
error.ref.companyNotFound=Company not found.
error.ref.userNotFound=User not found.
