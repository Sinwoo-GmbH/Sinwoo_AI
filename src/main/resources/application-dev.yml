spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sinwoo}
    username: ${DB_USERNAME:sinwoo}
    password: ${DB_PASSWORD:sinwoo}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  docker:
    compose:
      enabled: false
  jpa:
    show-sql: false

app:
  security:
    jwt-secret: ${APP_JWT_SECRET:change-me-dev-secret}
    access-token-ttl-seconds: ${APP_ACCESS_TOKEN_TTL:3600}
    refresh-token-ttl-seconds: ${APP_REFRESH_TOKEN_TTL:1209600}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:sinwoo}
    secret-key: ${MINIO_SECRET_KEY:sinwoo123}
    bucket: ${MINIO_BUCKET:sinwoo-dev}
    secure: ${MINIO_SECURE:false}

logging:
  level:
    com.sinwoo: info
