spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sinwoo}
    username: ${DB_USERNAME:sinwoo}
    password: ${DB_PASSWORD:sinwoo}
  docker:
    compose:
      enabled: false
  jpa:
    show-sql: false

app:
  security:
    jwt-secret: ${APP_JWT_SECRET:change-me-dev-secret}
    access-token-ttl-seconds: ${APP_ACCESS_TOKEN_TTL:3600}
    refresh-token-ttl-seconds: ${APP_REFRESH_TOKEN_TTL:1209600}
  auth:
    allowed-origins: ${APP_AUTH_ALLOWED_ORIGINS:}
logging:
  level:
    com.sinwoo: info
