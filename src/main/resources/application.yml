spring:
  application:
    name: sinwoo-backend
  profiles:
    default: local
  jackson:
    time-zone: UTC
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: Sinwoo Backend
    description: Modular monolith backend for Sinwoo B2B SaaS

app:
  security:
    jwt-secret: change-me-in-real-environments
    access-token-ttl-seconds: 3600
    refresh-token-ttl-seconds: 1209600
  auth:
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
    oauth-callback-path: /auth/callback
    customer-default-role-cd: ROLE_CUSTOMER_USER_MEMBER
    internal-default-role-cd: ROLE_PLATFORM_ADMIN
    default-locl-cd: en
  attendance:
    biz-tmzn-id: Europe/Berlin
    dflt-chkin-tm: "09:00"
    dflt-chkout-tm: "18:00"
    dflt-ctry-cd: DE
    dflt-region-cd: ALL
    holi-source: NAGER
    holi-api-url: https://date.nager.at/api/v3/PublicHolidays/%d/%s
