spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/sinwoo
    username: sinwoo
    password: sinwoo
  data:
    redis:
      host: localhost
      port: 6379
  docker:
    compose:
      enabled: false
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    com.sinwoo: debug
