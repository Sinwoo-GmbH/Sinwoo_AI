spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mariadb://localhost:3306/sinwoo
    username: sinwoo
    password: sinwoo
  data:
    redis:
      host: localhost
      port: 6379
  docker:
    compose:
      enabled: false
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: info
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.web: info
    org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver: debug
    com.sinwoo: debug
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [reqId:%X{reqId:-NO-REQ}] %logger{36} - %msg%n%wEx"
