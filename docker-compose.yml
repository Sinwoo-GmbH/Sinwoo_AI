services:
  mariadb:
    image: mariadb:11
    container_name: sinwoo-mariadb
    environment:
      MARIADB_DATABASE: sinwoo
      MARIADB_USER: sinwoo
      MARIADB_PASSWORD: sinwoo
      MARIADB_ROOT_PASSWORD: sinwoo
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "sinwoo", "-psinwoo"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sinwoo-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: sinwoo-minio
    environment:
      MINIO_ROOT_USER: sinwoo
      MINIO_ROOT_PASSWORD: sinwoo123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  mariadb_data:
  redis_data:
  minio_data:
