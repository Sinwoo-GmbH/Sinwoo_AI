services:
  mariadb:
    image: mariadb:11
    container_name: sinwoo-mariadb
    environment:
      MARIADB_DATABASE: sinwoo
      MARIADB_USER: sinwoo
      MARIADB_PASSWORD: sinwoo
      MARIADB_ROOT_PASSWORD: sinwoo
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "sinwoo", "-psinwoo"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mariadb_data:
